# Configuración de la app "Caramba B2B" (org Clicklab, Dev Dashboard).
# Se despliega con: pnpm shopify:deploy
#
# OJO: Shopify exige que `redirect_urls` compartan host con `application_url`.
# Para desarrollo local hay que apuntar ambos a http://localhost:3002 y volver
# a publicar (y luego revertir antes de tocar producción).

client_id = "9e9fce25701f75cbd5c207069264a379"
name = "Caramba B2B"
handle = "caramba-b2b"
application_url = "https://b2bcaramba.vercel.app"
embedded = false

[access_scopes]
# read_products + read_inventory: espejo de catálogo y stock
# write_inventory: descuento de stock al confirmar un pedido B2B
# read_locations: identificar la bodega contra la que se descuenta
scopes = "read_products,read_inventory,write_inventory,read_locations"
use_legacy_install_flow = false

[auth]
redirect_urls = [
  "https://b2bcaramba.vercel.app/api/auth/shopify/callback",
  "https://caramba-b2b.vercel.app/api/auth/shopify/callback",
  "https://app.caramba.cl/api/auth/shopify/callback",
]

[webhooks]
api_version = "2026-07"

  # Espejo en tiempo real. La entrega no está garantizada: la reconciliación
  # horaria y el full-sync semanal corrigen lo que se pierda.
  [[webhooks.subscriptions]]
  topics = [
    "products/create",
    "products/update",
    "products/delete",
    "inventory_levels/update",
    "inventory_levels/connect",
    "inventory_levels/disconnect",
    "inventory_items/update",
    "inventory_items/delete",
  ]
  uri = "https://b2bcaramba.vercel.app/api/webhooks/shopify"

  # Obligatorios por compliance de Shopify (GDPR). Respondemos 200 sin datos:
  # no almacenamos clientes de la tienda, solo colaboradores de empresas B2B.
  [webhooks.privacy_compliance]
  customer_deletion_url = "https://b2bcaramba.vercel.app/api/webhooks/shopify/compliance"
  customer_data_request_url = "https://b2bcaramba.vercel.app/api/webhooks/shopify/compliance"
  shop_deletion_url = "https://b2bcaramba.vercel.app/api/webhooks/shopify/compliance"
